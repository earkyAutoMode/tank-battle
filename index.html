<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坦克大战 (Battle City)</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex flex-col items-center justify-center min-h-screen overflow-hidden">
    <div id="game-container" class="relative bg-black border-4 border-gray-700 shadow-2xl">
        <canvas id="gameCanvas" width="624" height="624"></canvas>
        
        <!-- UI 覆盖层 -->
        <div id="ui-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-black bg-opacity-70">
            <h1 class="text-5xl font-bold mb-8 text-yellow-500 tracking-widest">坦克大战</h1>
            <div class="space-y-4">
                <button id="start-btn" class="w-48 py-3 bg-green-600 hover:bg-green-500 rounded-full text-xl font-bold transition-transform active:scale-95">开始游戏</button>
            </div>
            <div class="mt-8 text-sm text-gray-400 text-center">
                <p>移动: WASD / 方向键</p>
                <p>射击: 空格键 (Space)</p>
            </div>
        </div>

        <!-- 游戏结束/暂停 覆盖层 -->
        <div id="status-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-black bg-opacity-80 hidden">
            <h2 id="status-text" class="text-4xl font-bold mb-6 text-red-500">游戏结束</h2>
            <p id="final-score" class="text-xl mb-8">得分: 0</p>
            <button id="restart-btn" class="w-48 py-3 bg-blue-600 hover:bg-blue-500 rounded-full text-xl font-bold transition-transform active:scale-95">重新开始</button>
        </div>

        <!-- 实时得分 UI -->
        <div class="absolute top-2 right-2 flex space-x-4 text-sm font-mono">
            <div class="bg-gray-800 px-3 py-1 rounded">得分: <span id="score">0</span></div>
            <div class="bg-gray-800 px-3 py-1 rounded">生命: <span id="lives">3</span></div>
            <div class="bg-gray-800 px-3 py-1 rounded">敌人: <span id="enemy-count">0</span></div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
